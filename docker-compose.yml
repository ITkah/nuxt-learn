# Run everything with one command (works on any laptop after git clone):
#   docker compose up -d
#
# Or via npm:
#   npm start
#
# App:  http://localhost:3000
# DB:   localhost:5533
# Logs: docker compose logs -f app
services:
  db:
    image: postgres:16-alpine
    container_name: nuxt-learn-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nuxt
      POSTGRES_PASSWORD: nuxt
      POSTGRES_DB: nuxt_learn
    ports:
      - "5533:5432"
    volumes:
      - nuxt_learn_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nuxt -d nuxt_learn"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nuxt-learn-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://nuxt:nuxt@db:5432/nuxt_learn?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-jwt-secret-change-me}
      NUXT_HOST: 0.0.0.0
      NUXT_TELEMETRY_DISABLED: "1"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_nuxt:/app/.nuxt
    depends_on:
      db:
        condition: service_healthy

volumes:
  nuxt_learn_pgdata:
  app_node_modules:
  app_nuxt:
